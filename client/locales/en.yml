login_intro: "Welcome! This software is part of the Prosperous Software movement — an effort to bring sustainable funding to open source.\n\nTo use it, you first need to register an account. You only need to do this once: the same account works across every piece of software in the movement.\n\nCompanies earning more than $%{revenue} in annual revenue are asked to contribute %{revshare}% of it back to open source. For everyone else, it's completely free.\n\nRegister and generate an API key at the link below, then paste it in:\n\n%{url}"
