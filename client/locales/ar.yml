login_intro: "مرحبًا! هذا البرنامج جزء من حركة Prosperous Software — وهي حركة لتوفير تمويل مستدام للبرمجيات مفتوحة المصدر.\n\nلاستخدامه، عليك أولاً تسجيل حساب على %{url}. لن تحتاج إلى فعل ذلك سوى مرة واحدة: فالحساب نفسه يعمل مع جميع البرامج ضمن الحركة.\n\nيُطلب من الشركات التي تتجاوز إيراداتها السنوية %{revenue} دولار أن تساهم بنسبة %{revshare}% منها لدعم المصادر المفتوحة. أما الجميع عدا ذلك، فالاستخدام مجاني تمامًا.\n\nبعد التسجيل، أنشئ مفتاح API والصقه في الأسفل."
