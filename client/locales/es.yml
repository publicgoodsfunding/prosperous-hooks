login_intro: "¡Bienvenido! Este software forma parte del movimiento Prosperous Software, una iniciativa para dar financiación sostenible al código abierto.\n\nPara usarlo, primero debe registrar una cuenta en %{url}. Solo tiene que hacerlo una vez: la misma cuenta funciona con todo el software del movimiento.\n\nSe pide a las empresas con ingresos anuales superiores a %{revenue} USD que aporten el %{revshare}% de ellos al código abierto. Para todos los demás, es totalmente gratis.\n\nUna vez registrado, genere una clave API y péguela a continuación."
